version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: swiftdo-db
    environment:
      POSTGRES_USER: swiftdo
      POSTGRES_PASSWORD: swiftdo_pass
      POSTGRES_DB: swiftdo_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
